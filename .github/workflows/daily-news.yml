name: Daily friendly news

on:
  schedule:
    # 06:00 JST
    - cron: "0 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-friendly-news
  cancel-in-progress: false

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate daily news
        run: npm run news:generate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.4-mini' }}
          NEWS_TIMEZONE: Asia/Tokyo
          NEWS_ITEM_COUNT: "14"
          NEWS_AI_ITEM_COUNT: "7"
          NEWS_DEEP_GENAI_ITEM_COUNT: "2"
          NEWS_AI_MAX_AGE_HOURS: "24"
          NEWS_REPEAT_LOOKBACK_DAYS: "7"

      - name: Build site
        run: npm run build

      - name: Publish site to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

      - name: Commit generated news
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Generate daily friendly news"
          file_pattern: "docs/daily-news public/daily-news"
