name: Daily friendly news

on:
  schedule:
    # 06:00 JST
    - cron: "0 21 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-friendly-news
  cancel-in-progress: false

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate daily news
        run: npm run news:generate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.4-mini' }}
          NEWS_TIMEZONE: Asia/Tokyo
          NEWS_ITEM_COUNT: "12"
          NEWS_AI_ITEM_COUNT: "5"

      - name: Commit generated news
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Generate daily friendly news"
          file_pattern: "docs/daily-news public/daily-news"

      - name: Build site
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
